# ============================================
# Pipeline CI/CD - Liga Deportiva IES Maestre de Calatrava
# ============================================
# Este workflow ejecuta automáticamente todas las pruebas del proyecto:
# - Tests unitarios e integración de Angular (Jasmine/Karma)
# - Tests unitarios y Feature de Laravel (PHPUnit)
# - Tests E2E con Cypress
#
# Se activa en cada push o pull request a la rama principal.

name: CI/CD Tests Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ============================================
  # JOB 1: Tests de Laravel (Backend)
  # ============================================
  laravel-tests:
    name: Laravel Tests (PHPUnit)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: laravel-backend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml, pcre, pdo, reflection, spl, tokenizer, zip
          coverage: xdebug

      - name: Verificar versión de Composer
        run: composer -V

      - name: Copiar archivo de entorno
        run: cp .env.example .env || echo "APP_KEY=" > .env

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generar clave de aplicación
        run: php artisan key:generate

      - name: Configurar permisos de directorios
        run: chmod -R 777 storage bootstrap/cache

      - name: Ejecutar Tests Unitarios de Laravel
        run: php artisan test --testsuite=Unit --colors=always
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Ejecutar Tests Feature de Laravel
        run: php artisan test --testsuite=Feature --colors=always
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Resumen de Tests Laravel
        if: always()
        run: |
          echo "=========================================="
          echo "Tests de Laravel completados"
          echo "=========================================="

  # ============================================
  # JOB 2: Tests de Angular (Frontend)
  # ============================================
  angular-tests:
    name: Angular Tests (Jasmine/Karma)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: liga-deportiva

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: liga-deportiva/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Tests Unitarios de Angular
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: true

      - name: Resumen de Tests Angular
        if: always()
        run: |
          echo "=========================================="
          echo "Tests de Angular completados"
          echo "=========================================="

  # ============================================
  # JOB 3: Tests E2E con Cypress
  # ============================================
  cypress-e2e:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: [angular-tests]  # Ejecutar después de tests Angular
    
    defaults:
      run:
        working-directory: liga-deportiva

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: liga-deportiva/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Construir aplicación Angular
        run: npm run build
        continue-on-error: true

      - name: Ejecutar Tests E2E con Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: liga-deportiva
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 120
          browser: chrome
          headed: false
        continue-on-error: true

      - name: Subir screenshots de Cypress (si hay fallos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: liga-deportiva/cypress/screenshots
          retention-days: 7

      - name: Subir videos de Cypress
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: liga-deportiva/cypress/videos
          retention-days: 7
          if-no-files-found: ignore

      - name: Resumen de Tests E2E
        if: always()
        run: |
          echo "=========================================="
          echo "Tests E2E de Cypress completados"
          echo "=========================================="

  # ============================================
  # JOB 4: Resumen Final
  # ============================================
  test-summary:
    name: Resumen de Pruebas
    runs-on: ubuntu-latest
    needs: [laravel-tests, angular-tests, cypress-e2e]
    if: always()

    steps:
      - name: Mostrar resumen
        run: |
          echo "============================================"
          echo "    RESUMEN DE EJECUCIÓN DE PRUEBAS"
          echo "============================================"
          echo ""
          echo "Laravel Tests:  ${{ needs.laravel-tests.result }}"
          echo "Angular Tests:  ${{ needs.angular-tests.result }}"
          echo "Cypress E2E:    ${{ needs.cypress-e2e.result }}"
          echo ""
          echo "============================================"
          
      - name: Verificar resultado global
        if: contains(needs.*.result, 'failure')
        run: |
          echo "Algunos tests han fallado. Revisa los logs anteriores."
          exit 1
